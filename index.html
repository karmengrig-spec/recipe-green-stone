<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guesthouse Recipe Manager Online</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="script.js"></script>
</head>
<body>

<header>
<h1>Guesthouse Recipe Manager</h1>
<p>Online Cloud Version</p>
</header>

<main>

<section class="home-section" id="homeSection">

<h2>Recipe Categories</h2>

<div class="categories-grid">

<button class="category-btn" data-category="Breakfast">
Breakfast
</button>

<button class="category-btn" data-category="Dessert">
Dessert
</button>

<button class="category-btn" data-category="Sauce">
Sauce
</button>

<button class="category-btn" data-category="Soup">
Soup
</button>

<button class="category-btn" data-category="Main Dish">
Main Dish
</button>

<button class="category-btn" data-category="Bread">
Bread
</button>

<button class="category-btn" data-category="Salad">
Salad
</button>

</div>

<button id="showAddRecipeBtn" class="add-recipe-main-btn">
+ Add Recipe
</button>

</section>

<section class="form-section" id="formSection" style="display:none;">

<h2 id="formTitle">Add Recipe</h2>

<form id="recipeForm">

<input type="text" id="title" placeholder="Recipe name" required>

<select id="mealType" required>
<option value="">Select Meal Type</option>
<option>Breakfast</option>
<option>Dessert</option>
<option>Sauce</option>
<option>Soup</option>
<option>Main Dish</option>
<option>Bread</option>
<option>Salad</option>
</select>

<label>Upload Photo</label>
<input type="file" id="imageUpload" accept="image/*">

<textarea id="ingredients" placeholder="Ingredients"></textarea>

<textarea id="preparation" placeholder="Preparation"></textarea>

<input type="text" id="video" placeholder="Video link">

<button type="submit" id="saveBtn">Save Recipe</button>

</form>

</section>

<section class="recipes-section">

<div class="top-bar">

<button id="backHomeBtn">
← Home
</button>

<h2 id="categoryTitle">
Recipes
</h2>

<input type="text" id="searchInput" placeholder="Find recipe...">

</div>

<div id="recipesContainer"></div>

</section>

</main>

</body>
</html>
